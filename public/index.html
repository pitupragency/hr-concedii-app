<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
    'https://giaxergqcrvezigqkmea.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpYXhlcmdxY3J2ZXppZ3FrbWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzEwNDksImV4cCI6MjA5MjMwNzA0OX0.-mKUwl89qsJ8OkmQWLB_E0Cm5vkon6JG-2ydhmQoXKA'
  )

  let profile = null, requests = [], employees = [], leaveTypes = [], balances = []

  const FIXED_LEAVE_TYPES = ['Concediu de odihnă', 'Medical', 'Invoire', 'Altele']
  const ROMANIA_PUBLIC_HOLIDAYS_2026 = new Set([
    '2026-01-01',
    '2026-01-02',
    '2026-01-06',
    '2026-01-07',
    '2026-01-24',
    '2026-04-10',
    '2026-04-12',
    '2026-04-13',
    '2026-05-01',
    '2026-05-31',
    '2026-06-01',
    '2026-08-15',
    '2026-11-30',
    '2026-12-01',
    '2026-12-25',
    '2026-12-26'
  ])

  const loginScreen = document.getElementById('loginScreen')
  const appScreen = document.getElementById('appScreen')

  const show = (id, msg) => {
    const e = document.getElementById(id)
    e.textContent = msg
    e.classList.remove('hidden')
  }

  const hide = id => {
    const e = document.getElementById(id)
    e.textContent = ''
    e.classList.add('hidden')
  }

  const statusBadge = s => `<span class="status ${s==='approved'?'approved':s==='rejected'?'rejected':'pending'}">${s || '-'}</span>`
  const formatNumber = n => Number.isFinite(n) ? (Math.round(n * 10) / 10).toString() : '0'
  const normalizeName = name => String(name || '').trim().toLowerCase()

  function countsAgainstBalance(leaveTypeId){
    const leaveType = leaveTypes.find(t => t.id === leaveTypeId)
    const name = normalizeName(leaveType?.name)
    return name === 'concediu de odihnă' || name === 'concediu de odihna' || name === 'vacation leave'
  }

  async function ensureFixedLeaveTypes(){
    const existingNames = new Set(leaveTypes.map(t => normalizeName(t.name)))
    const missing = FIXED_LEAVE_TYPES.filter(name => !existingNames.has(normalizeName(name)))
    if(!missing.length) return

    const rowsToInsert = missing.map(name => ({
      name,
      counts_against_balance: normalizeName(name) === 'concediu de odihnă' || normalizeName(name) === 'concediu de odihna',
      requires_document: normalizeName(name) === 'medical',
      is_medical: normalizeName(name) === 'medical'
    }))

    const { error } = await supabase.from('leave_types').insert(rowsToInsert)
    if(error) {
      console.error('Could not create missing leave types:', error)
    }
  }

  function computeApprovedDays(rows, employeeId = null){
    return rows
      .filter(r => r.status === 'approved' && (!employeeId || r.employee_id === employeeId))
      .reduce((sum, r) => countsAgainstBalance(r.leave_type_id) ? sum + Number(r.total_days || 0) : sum, 0)
  }

  function updateBalanceKPIs(){
    const approvedDays = computeApprovedDays(requests, profile.id)
    const allowance = Number(profile.annual_allowance || 0)
    const balance = profile.role === 'admin' ? approvedDays : Math.max(allowance - approvedDays, 0)
    document.getElementById('kpiApprovedDays').textContent = formatNumber(approvedDays)
    document.getElementById('kpiBalance').textContent = profile.role === 'admin' ? '—' : formatNumber(balance)
  }

  function toLocalISODate(date){
    const year = date.getFullYear()
    const month = String(date.getMonth() + 1).padStart(2, '0')
    const day = String(date.getDate()).padStart(2, '0')
    return `${year}-${month}-${day}`
  }

  function calcDays(a, b){
    if(!a || !b) return ''

    const start = new Date(`${a}T12:00:00`)
    const end = new Date(`${b}T12:00:00`)

    if(Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return ''
    if(end < start) return ''

    let count = 0
    const current = new Date(start)

    while(current <= end){
      const dayOfWeek = current.getDay()
      const isoDate = toLocalISODate(current)
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6
      const isPublicHoliday = ROMANIA_PUBLIC_HOLIDAYS_2026.has(isoDate)

      if(!isWeekend && !isPublicHoliday){
        count++
      }

      current.setDate(current.getDate() + 1)
    }

    return count
  }

  function updateTotalDaysField(){
    const startValue = document.getElementById('startDate').value
    const endValue = document.getElementById('endDate').value
    const result = calcDays(startValue, endValue)
    document.getElementById('totalDays').value = result === '' ? '' : result
  }

  function renderProfile(){
    document.getElementById('welcomeTitle').textContent = `Welcome, ${profile.full_name}`
    document.getElementById('welcomeSubtitle').textContent = `Signed in as ${profile.email}`
    document.getElementById('roleBadge').textContent = `Role: ${profile.role}`
    document.getElementById('kpiUser').textContent = profile.full_name
    document.getElementById('kpiRolee').textContent = profile.role
    document.getElementById('requestsHint').textContent = profile.role === 'admin' ? 'View and manage all requests' : 'View and submit your requests'
    document.getElementById('employeesHint').textContent = profile.role === 'admin' ? 'View all employees' : 'View only your profile'
  }

  function renderLeaveTypes(){
    const sel = document.getElementById('leaveTypeSelect')
    const ordered = FIXED_LEAVE_TYPES.map(name => leaveTypes.find(t => normalizeName(t.name) === normalizeName(name))).filter(Boolean)
    const labelForType = (name) => {
      const n = normalizeName(name)
      if (n === 'concediu de odihnă' || n === 'concediu de odihna') return 'Vacation leave'
      if (n === 'invoire' || n === 'învoire') return 'Time off'
      if (n === 'altele') return 'Other'
      if (n === 'medical' || n === 'concediu medical') return 'Medical'
      return name
    }
    sel.innerHTML = ordered.length
      ? ordered.map(t => `<option value="${t.id}">${labelForType(t.name)}</option>`).join('')
      : '<option value="">The required leave types do not exist in the database</option>'
  }

  function renderEmployeesTable(rows){
    document.getElementById('employeesTableBody').innerHTML = rows.length
      ? rows.map(emp => `<tr><td>${emp.full_name}</td><td>${emp.email}</td><td>${emp.role}</td><td>${emp.annual_allowance ?? '-'}</td><td>${emp.is_active ? 'Active' : 'Inactive'}</td></tr>`).join('')
      : '<tr><td colspan="5">There are no visible employees.</td></tr>'

    document.getElementById('employeesMobileList').innerHTML = rows.length
      ? rows.map(emp => `<article class="mobile-record"><div class="mobile-row"><div class="mobile-label">Name</div><div class="mobile-value">${emp.full_name}</div></div><div class="mobile-row"><div class="mobile-label">Email</div><div class="mobile-value">${emp.email}</div></div><div class="mobile-row"><div class="mobile-label">Role</div><div class="mobile-value">${emp.role}</div></div><div class="mobile-row"><div class="mobile-label">Days per year</div><div class="mobile-value">${emp.annual_allowance ?? '-'}</div></div><div class="mobile-row"><div class="mobile-label">Status</div><div class="mobile-value">${emp.is_active ? 'Active' : 'Inactive'}</div></div></article>`).join('')
      : '<div class="mobile-record">There are no visible employees.</div>'
  }

  function renderRequests(){
    const typeLabelMap = new Map(leaveTypes.map(t => {
      const n = normalizeName(t.name)
      let label = t.name
      if (n === 'concediu de odihnă' || n === 'concediu de odihna') label = 'Vacation leave'
      else if (n === 'invoire' || n === 'învoire') label = 'Time off'
      else if (n === 'altele') label = 'Other'
      else if (n === 'medical' || n === 'concediu medical') label = 'Medical'
      return [t.id, label]
    }))

    document.getElementById('kpiRequests').textContent = requests.length
    updateBalanceKPIs()

    document.getElementById('requestsTableBody').innerHTML = requests.length
      ? requests.map(r => `<tr><td>${r.employee?.full_name || profile.full_name}</td><td>${typeLabelMap.get(r.leave_type_id) || '-'}</td><td>${r.start_date || '-'}</td><td>${r.end_date || '-'}</td><td>${r.total_days ?? '-'}</td><td>${statusBadge(r.status)}</td><td>${r.note || '-'}</td><td>${profile.role === 'admin' && r.status === 'pending' ? `<div class="actions"><button class="btn btn-small" data-action="approve" data-id="${r.id}">Approve</button><button class="btn btn-small" data-action="reject" data-id="${r.id}">Reject</button></div>` : '-'}</td></tr>`).join('')
      : '<tr><td colspan="8">There are no requests yet.</td></tr>'

    document.getElementById('requestsMobileList').innerHTML = requests.length
      ? requests.map(r => `<article class="mobile-record"><div class="mobile-row"><div class="mobile-label">Employee</div><div class="mobile-value">${r.employee?.full_name || profile.full_name}</div></div><div class="mobile-row"><div class="mobile-label">Type</div><div class="mobile-value">${typeLabelMap.get(r.leave_type_id) || '-'}</div></div><div class="mobile-row"><div class="mobile-label">Period</div><div class="mobile-value">${r.start_date || '-'} → ${r.end_date || '-'}</div></div><div class="mobile-row"><div class="mobile-label">Total days</div><div class="mobile-value">${r.total_days ?? '-'}</div></div><div class="mobile-row"><div class="mobile-label">Status</div><div class="mobile-value">${statusBadge(r.status)}</div></div><div class="mobile-row"><div class="mobile-label">Note</div><div class="mobile-value">${r.note || '-'}</div></div>${profile.role === 'admin' && r.status === 'pending' ? `<div class="mobile-actions"><button class="btn btn-small" data-action="approve" data-id="${r.id}">Approve</button><button class="btn btn-small" data-action="reject" data-id="${r.id}">Reject</button></div>` : ''}</article>`).join('')
      : '<div class="mobile-record">There are no requests yet.</div>'
  }

  function computeBalances(rows, employeesList){
    return employeesList.map(emp => {
      const empRows = rows.filter(r => r.employee_id === emp.id)
      const approved = empRows.reduce((sum, r) => r.status === 'approved' && countsAgainstBalance(r.leave_type_id) ? sum + Number(r.total_days || 0) : sum, 0)
      const pending = empRows.reduce((sum, r) => r.status === 'pending' && countsAgainstBalance(r.leave_type_id) ? sum + Number(r.total_days || 0) : sum, 0)
      const annual = Number(emp.annual_allowance || 0)
      return { full_name: emp.full_name, email: emp.email, annual_allowance: annual, approved_days: approved, pending_days: pending, remaining_days: Math.max(annual - approved, 0) }
    })
  }

  function renderBalancesTable(){
    const body = document.getElementById('balancesTableBody')
    body.innerHTML = balances.length
      ? balances.map(b => `<tr><td>${b.full_name}</td><td>${b.email}</td><td>${formatNumber(b.annual_allowance)}</td><td>${formatNumber(b.approved_days)}</td><td>${formatNumber(b.pending_days)}</td><td>${formatNumber(b.remaining_days)}</td></tr>`).join('')
      : '<tr><td colspan="6">No data available.</td></tr>'

    document.getElementById('balancesMobileList').innerHTML = balances.length
      ? balances.map(b => `<article class="mobile-record"><div class="mobile-row"><div class="mobile-label">Name</div><div class="mobile-value">${b.full_name}</div></div><div class="mobile-row"><div class="mobile-label">Email</div><div class="mobile-value">${b.email}</div></div><div class="mobile-row"><div class="mobile-label">Total per year</div><div class="mobile-value">${formatNumber(b.annual_allowance)}</div></div><div class="mobile-row"><div class="mobile-label">Approved</div><div class="mobile-value">${formatNumber(b.approved_days)}</div></div><div class="mobile-row"><div class="mobile-label">Pending</div><div class="mobile-value">${formatNumber(b.pending_days)}</div></div><div class="mobile-row"><div class="mobile-label">Remaining</div><div class="mobile-value">${formatNumber(b.remaining_days)}</div></div></article>`).join('')
      : '<div class="mobile-record">No data available.</div>'
  }

  async function loadProfile(){
    const { data: { user }, error: uErr } = await supabase.auth.getUser()
    if(uErr) throw uErr
    if(!user) return null
    const { data, error } = await supabase.from('employees').select('id, full_name, email, role, annual_allowance, is_active').eq('auth_user_id', user.id).single()
    if(error) throw error
    profile = data
    profile.auth_user_id = user.id
    return data
  }

  async function loadLeaveTypes(){
    let { data, error } = await supabase.from('leave_types').select('id, name, counts_against_balance, requires_document, is_medical').order('name')
    if(error) throw error
    leaveTypes = data || []
    await ensureFixedLeaveTypes()
    const secondLoad = await supabase.from('leave_types').select('id, name, counts_against_balance, requires_document, is_medical').order('name')
    if(secondLoad.error) throw secondLoad.error
    leaveTypes = secondLoad.data || []
    renderLeaveTypes()
  }

  async function loadEmployees(){
    if(profile.role === 'admin'){
      const { data, error } = await supabase.from('employees').select('id, full_name, email, role, annual_allowance, is_active').order('full_name')
      if(error) throw error
      employees = data || []
    } else {
      employees = [profile]
    }
    renderEmployeesTable(employees)
  }

  async function loadRequests(){
    if(profile.role === 'admin'){
      const { data, error } = await supabase.from('leave_requests').select('id, employee_id, leave_type_id, start_date, end_date, total_days, status, note, created_at, employee:employees!leave_requests_employee_id_fkey(full_name)').order('created_at', { ascending: false })
      if(error) throw error
      requests = data || []
    } else {
      const { data, error } = await supabase.from('leave_requests').select('id, employee_id, leave_type_id, start_date, end_date, total_days, status, note, created_at').eq('employee_id', profile.id).order('created_at', { ascending: false })
      if(error) throw error
      requests = data || []
    }
    renderRequests()
  }

  async function refreshAll(){
    hide('appError')
    await loadLeaveTypes()
    await loadEmployees()
    await loadRequests()
    balances = computeBalances(requests, profile.role === 'admin' ? employees : [profile])
    renderBalancesTable()
  }

  async function boot(){
    hide('appError')
    await loadProfile()
    if(!profile){
      show('loginError', 'The account exists in Auth, but was not found in employees.')
      return
    }
    loginScreen.classList.add('hidden')
    appScreen.classList.remove('hidden')
    renderProfile()
    try{
      await refreshAll()
    }catch(err){
      console.error(err)
      show('appError', 'Error loading data: ' + (err.message || JSON.stringify(err)))
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault()
    hide('loginError')
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const { error } = await supabase.auth.signInWithPassword({ email, password })
    if(error){ show('loginError', error.message); return }
    await boot()
  })

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut()
    appScreen.classList.add('hidden')
    loginScreen.classList.remove('hidden')
  })

  document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'))
    document.querySelectorAll(`[data-view="${btn.dataset.view}"]`).forEach(b => b.classList.add('active'))
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'))
    document.getElementById('view-' + btn.dataset.view).classList.remove('hidden')
    window.scrollTo({ top: 0, behavior: 'smooth' })
  }))

  document.getElementById('startDate').addEventListener('change', updateTotalDaysField)
  document.getElementById('endDate').addEventListener('change', updateTotalDaysField)

  document.getElementById('requestForm').addEventListener('submit', async e => {
    e.preventDefault()
    hide('appError'); hide('appSuccess')

    try {
      updateTotalDaysField()

      const payload = {
        employee_id: profile.id,
        leave_type_id: document.getElementById('leaveTypeSelect').value || null,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        total_days: Number(document.getElementById('totalDays').value || 0),
        note: document.getElementById('requestNote').value.trim() || null
      }

      const { error } = await supabase.from('leave_requests').insert(payload)
      if(error) throw error

      document.getElementById('requestForm').reset()
      document.getElementById('totalDays').value = ''
      show('appSuccess', 'The request was submitted successfully.')
      await refreshAll()
    } catch(err) {
      console.error(err)
      show('appError', 'Could not save the request: ' + (err.message || JSON.stringify(err)) + ' — check the INSERT policy on leave_requests and leave_types.')
    }
  })

  document.getElementById('requestsTableBody').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]')
    if(!btn) return
    hide('appError'); hide('appSuccess')
    try {
      const status = btn.dataset.action === 'approve' ? 'approved' : 'rejected'
      const { error } = await supabase.from('leave_requests').update({ status }).eq('id', btn.dataset.id)
      if(error) throw error
      show('appSuccess', status === 'approved' ? 'The request was approved.' : 'The request was rejected.')
      await refreshAll()
    } catch(err) {
      console.error(err)
      show('appError', 'Could not update the request: ' + (err.message || JSON.stringify(err)))
    }
  })

  function downloadCSV(filename, rows){
    if(!rows.length){ show('appError', 'There is no data to export.'); return }
    const headers = Object.keys(rows[0])
    const csv = [headers.join(','), ...rows.map(row => headers.map(h => `"${String(row[h] ?? '').replace(/"/g, '""')}"`).join(','))].join('\n')
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
    const link = document.createElement('a')
    link.href = URL.createObjectURL(blob)
    link.download = filename
    link.click()
  }

  document.getElementById('exportRequestsBtn')?.addEventListener('click', () => {
    if(profile.role !== 'admin') return
    const rows = requests.map(r => ({ employee: r.employee?.full_name || profile.full_name, leave_type: (() => { const t = leaveTypes.find(t => t.id === r.leave_type_id); const n = normalizeName(t?.name); if (n === 'concediu de odihnă' || n === 'concediu de odihna') return 'Vacation leave'; if (n === 'invoire' || n === 'învoire') return 'Time off'; if (n === 'altele') return 'Other'; if (n === 'medical' || n === 'concediu medical') return 'Medical'; return t?.name || ''; })(), start: r.start_date || '', end: r.end_date || '', total_days: r.total_days || '', status: r.status || '', note: r.note || '' }))
    downloadCSV('cereri-concediu.csv', rows)
  })

  document.getElementById('exportBalancesBtn')?.addEventListener('click', () => {
    if(profile.role !== 'admin') return
    const rows = balances.map(b => ({ name: b.full_name, email: b.email, annual_total: b.annual_allowance, approved: b.approved_days, pending: b.pending_days, remaining: b.remaining_days }))
    downloadCSV('solduri-concediu.csv', rows)
  })

  const { data: { session } } = await supabase.auth.getSession()
  if(session) await boot()
</script>
